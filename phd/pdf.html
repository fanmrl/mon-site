<script>
  const menuToggle = document.getElementById('menu-toggle');
  const chapters = document.getElementById('chapters');

  menuToggle.addEventListener('click', e => {
    e.preventDefault();
    chapters.classList.toggle('visible');
    menuToggle.classList.toggle('active');
  });

  document.querySelectorAll('.carousel').forEach(carousel => {
    let index = 0;
    const track = carousel.querySelector('.carousel-track');
    const slides = track.children.length;

    carousel.addEventListener('click', () => {
      index = (index + 1) % slides;
      track.style.transform = `translateX(-${index * 100}%)`;
    });
  });
</script>

<script>

  });
</script>


  <!-- SURLIGNAGE-->

<script>
// ===== Surlignage progressif mots-clés =====
const keywords = document.querySelectorAll(".keyword");

const observer = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    const el = entry.target;
    if (!el.dataset.highlighted) el.dataset.highlighted = "false";

    if (entry.isIntersecting) {
      const ratio = entry.intersectionRatio; // proportion visible
      // On augmente le progress cumulatif
      el.dataset.progress = Math.max(el.dataset.progress || 0, ratio * 100);
      el.style.setProperty('--progress', el.dataset.progress + '%');
      el.dataset.highlighted = "true";
    }
  });
}, {
  threshold: Array.from({length: 101}, (_, i) => i/100) // 0.00 → 1.0 pour animation fluide
});

keywords.forEach(k => observer.observe(k));

// ===== Mini éditeur interactif =====
const editor = document.getElementById("editor");

editor.addEventListener("mouseup", () => {
  const selection = window.getSelection();
  if (selection.rangeCount === 0) return;

  const range = selection.getRangeAt(0);
  if (!editor.contains(range.commonAncestorContainer)) return;
  if (range.collapsed) return; // rien sélectionné

  const span = document.createElement("span");
  span.className = "highlight-manual";

  try {
    range.surroundContents(span);
  } catch (e) {
    const docFrag = range.extractContents();
    span.appendChild(docFrag);
    range.insertNode(span);
  }

  selection.removeAllRanges();
});
</script>
